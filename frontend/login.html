<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - The Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono&family=Crimson+Pro&display=swap" rel="stylesheet">
<style>
body {
  background:#f5f0e8;
  font-family:'Crimson Pro',serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}
.box {
  background:white;
  padding:3rem;
  border:2px solid #1a1208;
  width:350px;
}
h1 {
  font-family:'Playfair Display',serif;
  margin-bottom:1.5rem;
}
input {
  width:100%;
  padding:.6rem;
  margin-bottom:1rem;
  border:1px solid #ccc;
}
button {
  width:100%;
  padding:.7rem;
  background:#b84a1e;
  color:white;
  border:none;
  cursor:pointer;
}
.error {
  color:red;
  font-size:.8rem;
  margin-top:.5rem;
}
</style>
</head>
<body>

<div class="box">
<h1>Admin Login</h1>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<div class="error" id="error"></div>
</div>

<script>
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  // Change credentials here
  if(user === "admin" && pass === "admin123"){
    sessionStorage.setItem("blog_auth","true");
    window.location.href = "admin.html";
  } else {
    document.getElementById("error").textContent = "Invalid credentials";
  }
}
</script>

</body>
</html>
